<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדן & ירדן 💖</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff0f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center; }
        .setup-btn { background: #ff69b4; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 20px; font-size: 14px; color: #666; word-break: break-all; padding: 10px; background: #f9f9f9; border-radius: 10px; min-height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>היי ❤️</h1>
        <div id="setup-ui">
            <p>צעד אחרון למפתח:</p>
            <button class="setup-btn" onclick="initNotifications()">לחצי כאן לאישור 🔔</button>
        </div>
        <div id="status">טוען מערכת...</div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyATfY1TGL01-VVFdBwfbZ65-ctXtkYufzI",
        authDomain: "message-505ba.firebaseapp.com",
        projectId: "message-505ba",
        storageBucket: "message-505ba.firebasestorage.app",
        messagingSenderId: "712427275013",
        appId: "1:712427275013:web:a6a579f958815690b86d6c"
    };
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    async function initNotifications() {
        if (!('Notification' in window)) {
            document.getElementById('status').innerHTML = "<b>שימי לב:</b> באייפון חייבים ללחוץ על 'שתף' ואז 'הוסף למסך הבית' כדי שזה יעבוד.";
            return;
        }
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await messaging.getToken({ vapidKey: 'NH9xnzPfdIK_QLxKGmX9ErMYzDIBuAIzK2crtUEhmTU' });
                document.getElementById('status').innerText = "✅ המפתח שלך: " + token;
                document.getElementById('setup-ui').style.display = 'none';
            } else {
                document.getElementById('status').innerText = "ההתראות חסומות בהגדרות המכשיר.";
            }
        } catch (e) {
            document.getElementById('status').innerText = "שגיאה: " + e.message;
        }
    }
    document.getElementById('status').innerText = "המערכת מוכנה. אם את במסך הבית - לחצי על הכפתור.";
</script>
</body>
</html>
