<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדן & ירדן - הודעות מהלב 💖</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f2; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .btn { background: #ffefef; border: 2px solid #ff4b2b; border-radius: 15px; padding: 15px; margin: 5px; cursor: pointer; width: 45%; font-size: 14px; }
        .btn span { font-size: 24px; display: block; }
        .send-btn { background: #ff4b2b; color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; margin-top: 10px; font-weight: bold; }
        #status { color: #888; font-size: 12px; margin-top: 10px; }
        .setup-btn { background: #4CAF50; color: white; padding: 10px; border-radius: 10px; border: none; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>היי עדן ✨</h1>
    <button class="setup-btn" onclick="setupNotifications()">הפעל התראות בטלפון זה 🔔</button>
    
    <div style="display: flex; flex-wrap: wrap; justify-content: center;">
        <button class="btn" onclick="sendMsg('אל תשכח מטרנה לרום בדרך הביתה! 🍼')">
            <span>🍼</span> מטרנה לרום
        </button>
        <button class="btn" onclick="sendMsg('אל תשכח חלב! 🥛')">
            <span>🥛</span> להביא חלב
        </button>
        <button class="btn" onclick="sendMsg('אוהבת אותך! ❤️')">
            <span>💖</span> מסר של אהבה
        </button>
        <button class="btn" onclick="sendMsg('מה אוכלים היום? 🍕')">
            <span>🍕</span> אני רעבה
        </button>
    </div>

    <input type="text" id="freeText" style="width: 90%; padding: 10px; margin-top: 15px; border-radius: 10px; border: 1px solid #ddd;" placeholder="כתבי משהו אחר...">
    <button class="send-btn" onclick="sendCustom()">שלחי לירדן 🚀</button>
    
    <p id="status">סטטוס: מוכן לשליחה</p>
</div>

<script>
    // כאן יבוא הקוד שיחבר אותנו לשרת ההתראות
    async function setupNotifications() {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            document.getElementById('status').innerText = "התראות מאושרות! ✅";
            // כאן נרשום את המכשיר ב-Firebase בשלב הבא
        } else {
            alert("חובה לאשר התראות כדי שזה יעבוד!");
        }
    }

    function sendMsg(text) {
        document.getElementById('status').innerText = "שולח: " + text;
        // פונקציית השליחה האמיתית תופעל כאן
        console.log("Sending to server:", text);
    }

    function sendCustom() {
        const val = document.getElementById('freeText').value;
        if(val) sendMsg(val);
    }
</script>

</body>
</html>
