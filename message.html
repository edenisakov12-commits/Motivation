<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדן & ירדן - הבית שלנו 💖</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging-compat.js"></script>
    
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #fff0f5; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center; }
        h1 { color: #ff69b4; font-size: 24px; margin-bottom: 20px; }
        .btn { background: #fff; border: 2px solid #ff69b4; border-radius: 20px; padding: 20px; margin: 10px 0; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; color: #ff69b4; transition: 0.3s; box-sizing: border-box; }
        .btn:active { background: #ff69b4; color: white; transform: scale(0.95); }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 15px; font-size: 13px; background: #f8f8f8; color: #666; word-break: break-all; min-height: 40px; }
        .setup-btn { background: #ff69b4; color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>היי ❤️</h1>
    
    <div id="main-ui" style="display: none;">
        <button class="btn" onclick="sendToPartner('אל תשכח מטרנה לרום! 🍼')">🍼 מטרנה לרום</button>
        <button class="btn" onclick="sendToPartner('אוהבת אותך! ❤️')">❤️ הודעת אהבה</button>
        <button class="btn" onclick="sendToPartner('צריך לקנות חלב 🥛')">🥛 להביא חלב</button>
    </div>

    <div id="setup-ui">
        <p>כדי שההודעות יקפצו בטלפון:</p>
        <button class="setup-btn" onclick="initNotifications()">לחצי כאן לאישור 🔔</button>
    </div>

    <div id="status" class="status-box">ממתין לפעולה...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyATfY1TGL01-VVFdBwfbZ65-ctXtkYufzI",
        authDomain: "message-505ba.firebaseapp.com",
        projectId: "message-505ba",
        storageBucket: "message-505ba.firebasestorage.app",
        messagingSenderId: "712427275013",
        appId: "1:712427275013:web:a6a579f958815690b86d6c"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    async function initNotifications() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await messaging.getToken({ vapidKey: 'NH9xnzPfdIK_QLxKGmX9ErMYzDIBuAIzK2crtUEhmTU' });
                if (token) {
                    document.getElementById('status').innerText = "✅ הצלחת! העתיקי את המפתח ושלחי לי: " + token;
                    document.getElementById('setup-ui').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'block';
                }
            } else {
                document.getElementById('status').innerText = "ההתראות חסומות. כנסי להגדרות > התראות > ואשרי לאפליקציה.";
            }
        } catch (error) {
            document.getElementById('status').innerText = "שגיאה: חייבים לפתוח מהמסך הבית (אחרי שהוספת ב'שיתוף')";
        }
    }

    function sendToPartner(msg) {
        alert("הודעה נשלחה בבדיקה: " + msg);
    }
</script>
</body>
</html>
