<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עדן & ירדן - הודעות מהלב 💖</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff0f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .btn { background: #fff; border: 2px solid #ff69b4; border-radius: 15px; padding: 15px; margin: 5px; cursor: pointer; width: 45%; font-size: 14px; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        .btn span { font-size: 24px; display: block; }
        .send-btn { background: #ff69b4; color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; margin-top: 10px; font-weight: bold; cursor: pointer; }
        #status { color: #888; font-size: 14px; margin-top: 15px; background: #eee; padding: 10px; border-radius: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h1>היי עדן ✨</h1>
    <p>מה להזכיר לירדן?</p>
    
    <div style="display: flex; flex-wrap: wrap; justify-content: center;">
        <button class="btn" onclick="copyToken()">
            <span>📲</span> שלב 1: העתק מפתח ירדן
        </button>
        <button class="btn" onclick="sendToFirebase('אל תשכח מטרנה לרום! 🍼')">
            <span>🍼</span> מטרנה לרום
        </button>
        <button class="btn" onclick="sendToFirebase('צריך לקנות חלב 🥛')">
            <span>🥛</span> להביא חלב
        </button>
        <button class="btn" onclick="sendToFirebase('אוהבת אותך! ❤️')">
            <span>💖</span> הודעת אהבה
        </button>
    </div>
    
    <p id="status">טוען מערכת... אנא אשרי התראות אם תתבקשי</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyATfY1TGL01-VVFdBwfbZ65-ctXtkYufzI",
        authDomain: "message-505ba.firebaseapp.com",
        projectId: "message-505ba",
        storageBucket: "message-505ba.firebasestorage.app",
        messagingSenderId: "712427275013",
        appId: "1:712427275013:web:a6a579f958815690b86d6c"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    // רישום לקבלת התראות
    messaging.getToken({ vapidKey: 'NH9xnzPfdIK_QLxKGmX9ErMYzDIBuAIzK2crtUEhmTU' })
        .then((currentToken) => {
            if (currentToken) {
                document.getElementById('status').innerText = "המפתח שלך מוכן! שלחי אותו לירדן כדי שיוכל לשלוח לך הודעות.";
                window.myToken = currentToken;
            } else {
                document.getElementById('status').innerText = "לא התקבל מפתח. בדקי הרשאות.";
            }
        }).catch((err) => {
            document.getElementById('status').innerText = "שגיאה: " + err;
        });

    function copyToken() {
        if(window.myToken) {
            navigator.clipboard.writeText(window.myToken);
            alert("המפתח הועתק! שלחי אותו לירדן בוואטסאפ.");
        }
    }

    function sendToFirebase(msg) {
        alert("כדי לשלוח את ההודעה: '" + msg + "' באמת, נשתמש במערכת השליחה של Firebase שבנינו.");
    }
</script>
</body>
</html>
