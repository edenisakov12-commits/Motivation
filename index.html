<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחוז באר שבע - הכי מגובשות שיש</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --soft-pink: #fdf2f8;
            --deep-blue: #1e3a8a;
            --accent-pink: #db2777;
        }

        body {
            background: linear-gradient(135deg, #fce7f3 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 85%;
            border: 2px solid #fff;
        }

        .unit-label {
            display: inline-block;
            background: var(--deep-blue);
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        h1 {
            color: var(--accent-pink);
            margin: 10px 0;
            font-size: 28px;
        }

        #message-display {
            background: white;
            border: 2px solid #f9a8d4;
            border-radius: 25px;
            padding: 30px;
            margin: 25px 0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            line-height: 1.5;
            color: #374151;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-inspire {
            background: linear-gradient(45deg, #db2777, #f472b6);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(219, 39, 119, 0.3);
            transition: transform 0.2s;
        }

        .btn-inspire:active {
            transform: scale(0.92);
        }

        .sub-text {
            margin-top: 25px;
            font-size: 14px;
            color: #6b7280;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="unit-tag" class="unit-label">מחוז באר שבע</div>
        <h1>מחוז מספר 1! 🏆</h1>
        
        <div id="message-display">
            מוכנות לרגע של גאווה? <br> לחצי על הכפתור למסר אישי...
        </div>

        <button class="btn-inspire" onclick="nextUnitMessage()">לחצי למסר הבא ✨</button>

        <div class="sub-text">הנבחרת המגובשת ביותר במשרד הביטחון</div>
    </div>

    <script>
        // רשימת יחידות ומסרים אישיים
        const unitData = [
            {
                unit: "יחידת המרפאה",
                msg: "לנבחרת המרפאה - אתן הלב הפועם והמרגיע של המחוז. תודה על הטיפול המסור והלב הענק שאתן נותנות לכל פונה!"
            },
            {
                unit: "יחידת הרווחה",
                msg: "בנות הרווחה היקרות - אתן הרוח הגבית והכוח המניע של אגף השיקום. הנתינה שלכן היא השראה לכולנו!"
            },
            {
                unit: "עובדות סוציאליות",
                msg: "לעובדות הסוציאליות המדהימות - עבודת הקודש שלכן עם הפצועים והמשפחות היא עמוד התווך של המחוז. אתן גיבורות!"
            },
            {
                unit: "קשרי לקוחות",
                msg: "בנות קשרי הלקוחות - החיוך, הסבלנות והמקצועיות שלכן הם הפנים המאירות של המחוז. אין עליכן!"
            },
            {
                unit: "המנהלה",
                msg: "צוות המנהלה היקר - אתן אלו שגורמות להכל לעבוד בצורה מושלמת מאחורי הקלעים. בלעדיכן שום דבר לא קורה!"
            },
            {
                unit: "מנהלת המחוז",
                msg: "למנהלת המחוז שלנו - תודה על ההובלה, החזון ועל כך שאת דואגת שנהיה המחוז הכי טוב והכי מגובש שיש!"
            },
            {
                unit: "גאוות יחידה",
                msg: "מחוז באר שבע הוא לא רק מקום עבודה, הוא משפחה נשית עוצמתית ומגובשת. פשוט המחוז הכי טוב בארץ!"
            }
        ];

        let currentIndex = 0;

        function nextUnitMessage() {
            const tag = document.getElementById('unit-tag');
            const display = document.getElementById('message-display');
            
            // 1. קונפטי חגיגי
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#db2777', '#1e3a8a', '#ffffff']
            });

            // 2. עדכון התוכן לפי הסדר (כך שלא יהיה אותו דבר פעמיים ברצף)
            const currentItem = unitData[currentIndex];
            
            display.style.transform = "scale(0.95)";
            display.style.opacity = "0";

            setTimeout(() => {
                tag.innerText = currentItem.unit;
                display.innerText = currentItem.msg;
                display.style.transform = "scale(1)";
                display.style.opacity = "1";
                
                // 3. קידום האינדקס (חזרה להתחלה אם הגענו לסוף)
                currentIndex = (currentIndex + 1) % unitData.length;
            }, 200);
        }
    </script>
</body>
</html>
