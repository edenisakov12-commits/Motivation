<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחוז באר שבע - הנבחרת המנצחת</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #fdf2f8;
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent: #ec4899;
            --primary: #3b82f6;
        }

        body {
            background: linear-gradient(135deg, #fce7f3 0%, #dbeafe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #1e293b;
        }

        .container {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid #fff;
        }

        .header-tag {
            background: #fbcfe8;
            color: #9d174d;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            color: #1e3a8a;
            margin: 5px 0;
            font-size: 30px;
        }

        .units-nav {
            font-size: 15px;
            color: #64748b;
            margin: 15px 0 25px;
            line-height: 1.6;
        }

        #message-box {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #334155;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }

        .action-btn {
            background: linear-gradient(45deg, #ec4899, #f472b6);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3);
            font-weight: bold;
            transition: transform 0.2s;
        }

        .action-btn:active { transform: scale(0.95); }

        .footer-text {
            margin-top: 30px;
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-tag">המחוז הכי טוב שיש! 🏆</div>
        <h1>מחוז באר שבע</h1>
        
        <div class="units-nav">
            מרפאה • רווחה • עובדים סוציאלים • קשרי לקוחות • מנהלה
        </div>

        <div id="message-box">
            מחכות למסר המיוחד שלכן? <br> לחצו על הכפתור! ✨
        </div>

        <button class="action-btn" onclick="deliverMessage()">לחצי לקבלת מסר ✨</button>

        <div class="footer-text">
            באר שבע - המחוז הכי מגובש במשרד הביטחון!
        </div>
    </div>

    <script>
        const messages = [
            "אין על בנות מחוז באר שבע - אנחנו המחוז הכי חזק, הכי משפחתי והכי מגובש שיש!",
            "צוות המנהלה ומנהלת המחוז המדהימה - אתן הלב הפועם שגורם להכל לעבוד בצורה מושלמת!",
            "בנות קשרי הלקוחות - החיוך והשירות שלכן הם הפנים המאירות של מחוז באר שבע!",
            "לצוות המרפאה שלנו - תודה על הטיפול המסור והלב הענק שאתן נותנות בכל יום!",
            "בנות הרווחה והעובדים הסוציאלים - עבודת הקודש שלכן בשיקום היא השליחות הכי גדולה שיש!",
            "מנהלת המחוז שלנו מובילה את הנבחרת הכי טובה בארץ. גאווה לעבוד כאן!",
            "באר שבע זה לא רק מחוז, זו משפחה אחת גדולה שבה כל אחת היא כוכבת!",
            "כל הכבוד למנהלה על התמיכה והמקצועיות - אתן הבסיס האיתן שלנו!",
            "עובדים סוציאלים יקרים, הרגישות והכוח שלכם הם עמודי התווך של אגף השיקום!"
        ];

        function deliverMessage() {
            // חגיגת קונפטי
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ec4899', '#3b82f6', '#ffffff']
            });

            const box = document.getElementById('message-box');
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            
            box.style.opacity = 0;
            setTimeout(() => {
                box.innerText = randomMsg;
                box.style.opacity = 1;
                box.style.borderColor = "#fbcfe8";
            }, 200);
        }
    </script>
</body>
</html>
