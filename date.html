<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדייטים של עדן וירדן ❤️</title>
    <style>
        :root {
            --eden-color: #ffafbd;
            --yarden-color: #ffc3a0;
            --accent: #ff4b2b;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(to bottom, #ffafbd, #ffc3a0); 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            color: #444;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px;
        }
        h1 { font-size: 1.8rem; color: #ff4b2b; margin-bottom: 10px; }
        .names { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; color: #666; }
        
        .game-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .choice-btn {
            flex: 1; padding: 20px; border-radius: 25px; border: none; cursor: pointer;
            font-weight: bold; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .btn-home { background: #fff0f6; color: #d81b60; }
        .btn-out { background: #e6f7ff; color: #0077b6; }
        .choice-btn:active { transform: scale(0.9); }

        /* חלונית התוצאה */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 35px; width: 85%; max-width: 350px;
            text-align: center; position: relative; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .share-wa { background: #25D366; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 15px; font-weight: bold; }
        .reset-link { margin-top: 25px; font-size: 0.8rem; color: #999; cursor: pointer; border: none; background: none; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>הדייטים שלנו ❤️</h1>
        <div class="names">עדן & ירדן</div>
        <p>מה נעשה הפעם? בחרו אווירה:</p>
        
        <div class="game-buttons">
            <button class="choice-btn btn-home" onclick="pick('home')">
                <span style="font-size: 2.5rem;">🏠</span>
                <span>בבית</span>
            </button>
            <button class="choice-btn btn-out" onclick="pick('out')">
                <span style="font-size: 2.5rem;">✨</span>
                <span>בחוץ</span>
            </button>
        </div>

        <div id="stats" style="margin-top: 20px; font-size: 0.9rem; color: #888;"></div>
        <button class="reset-link" onclick="resetAll()">איפוס נתונים</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div id="res-emoji" style="font-size: 4rem;"></div>
            <h2 id="res-title" style="color: #333; margin: 15px 0;"></h2>
            <div id="res-desc" style="color: #666; margin-bottom: 20px;"></div>
            
            <a id="wa-link" href="#" target="_blank" class="share-wa">שלחי לירדן בוואטסאפ 📱</a>
            <br>
            <button onclick="closeModal()" style="margin-top: 15px; border: none; background: #eee; padding: 8px 20px; border-radius: 20px; cursor: pointer;">סגור</button>
        </div>
    </div>

    <script>
        const database = {
            home: [
                {t: "ערב סרט ופיצה", d: "עדן וירדן בערב של שקט, פיצה חמה וסרט טוב מתחת לשמיכה", e: "🍕"},
                {t: "תחרות מאסטר-שף", d: "מבשלים משהו משוגע ממה שיש במקרר ומחליטים מי השף המנצח", e: "👨‍🍳"},
                {t: "ערב משחקי קופסה", d: "מוציאים את הטאקי או המונופול ותחרות עד הסוף!", e: "🎲"},
                {t: "ספא ביתי מפנק", d: "נרות, מוזיקה רגועה ומסאז' אחד לשנייה אחרי יום ארוך", e: "🕯️"},
                {t: "ערב קוקטיילים", d: "מנסים להכין משקאות צבעוניים ממה שיש בארון המשקאות", e: "🍸"}
            ],
            out: [
                {t: "דייט גלידה", d: "יוצאים לסיבוב קצר, אוכלים גלידה ומדברים על הכל חוץ מעבודה וילדים", e: "🍦"},
                {t: "ערב סטנד-אפ", d: "יוצאים לצחוק קצת מהלב ולשכוח מהכל", e: "🎤"},
                {t: "מסעדה חדשה", d: "הולכים למקום שמעולם לא הייתם בו ומזמינים משהו מוזר", e: "🍽️"},
                {t: "טיול לילי בים", d: "הליכה עם רגליים בחול וקפה בתרמוס מול הגלים", e: "🌊"},
                {t: "סרט ב-VIP", d: "כי מגיע לכם להתפנק בכורסאות נוחות עם פופקורן", e: "🎟️"}
            ]
        };

        let stats = JSON.parse(localStorage.getItem('eden_yarden_stats')) || { home: 0, out: 0 };

        function pick(type) {
            const list = database[type];
            const idea = list[Math.floor(Math.random() * list.length)];
            
            document.getElementById('res-emoji').innerText = idea.e;
            document.getElementById('res-title').innerText = idea.t;
            document.getElementById('res-desc').innerText = idea.d;
            
            // הכנת לינק לוואטסאפ
            const waText = encodeURIComponent(`היי ירדן, יצא לנו דייט! ${idea.e}\n${idea.t}: ${idea.d}`);
            document.getElementById('wa-link').href = `https://wa.me/?text=${waText}`;
            
            stats[type]++;
            localStorage.setItem('eden_yarden_stats', JSON.stringify(stats));
            updateStats();
            document.getElementById('modal').style.display = 'flex';
        }

        function updateStats() {
            document.getElementById('stats').innerText = `צברנו יחד: ${stats.home + stats.out} דייטים!`;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function resetAll() {
            if(confirm("לאפס את המונה?")) {
                stats = { home: 0, out: 0 };
                localStorage.removeItem('eden_yarden_stats');
                updateStats();
            }
        }

        updateStats();
    </script>
</body>
</html>
