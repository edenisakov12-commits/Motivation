<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדייטים של עדן וירדן ❤️</title>
    <style>
        :root {
            --eden-pink: #ffafbd;
            --yarden-orange: #ffc3a0;
            --accent: #ff4b2b;
            --success: #4caf50;
            --gray: #9e9e9e;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, var(--eden-pink), var(--yarden-orange)); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px;
        }
        h1 { color: var(--accent); margin-bottom: 5px; font-size: 1.6rem; }
        .names { font-weight: bold; color: #777; margin-bottom: 20px; }
        
        .game-buttons { display: flex; gap: 15px; margin-bottom: 20px; }
        .choice-btn {
            flex: 1; padding: 15px; border-radius: 20px; border: none; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 10px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; font-weight: bold;
        }
        .btn-home { background: #fff0f6; color: #d81b60; }
        .btn-out { background: #e6f7ff; color: #0077b6; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 30px; width: 85%; max-width: 350px; text-align: center;
        }

        .action-btn { width: 100%; padding: 12px; margin: 5px 0; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .wish-btn { background: #fff3e0; color: #ef6c00; }
        .done-btn { background: var(--success); color: white; }
        
        .list-section {
            width: 100%; max-width: 400px; margin-top: 25px; background: white; border-radius: 20px; padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .list-item {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem;
        }
        .item-actions { display: flex; gap: 10px; }
        .btn-icon { cursor: pointer; font-size: 1.1rem; filter: grayscale(0.5); }
        .btn-icon:hover { filter: grayscale(0); }

        .reset-all { margin-top: 30px; background: none; border: none; color: #777; text-decoration: underline; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>הדייטים שלנו ❤️</h1>
        <div class="names">עדן & ירדן</div>
        
        <div class="game-buttons">
            <button class="choice-btn btn-home" onclick="pick('home')"><span>🏠</span>בבית</button>
            <button class="choice-btn btn-out" onclick="pick('out')"><span>🚗</span>בחוץ</button>
        </div>

        <div id="counter-display" style="font-weight: bold; color: var(--accent); font-size: 1.1rem;">
            דייטים שעשינו: 0
        </div>
    </div>

    <div class="list-section" id="wishlist-container" style="display:none;">
        <h3 style="margin-top:0; font-size: 1rem; color: #555;">🤔 מתלבטים לגבי:</h3>
        <div id="wishlist-items"></div>
    </div>

    <button class="reset-all" onclick="fullReset()">אפס הכל והתחל מחדש</button>

    <div id="modal">
        <div class="modal-content">
            <div id="res-emoji" style="font-size: 3.5rem;"></div>
            <h2 id="res-title" style="margin: 10px 0;"></h2>
            <p id="res-desc" style="color: #666; font-size: 0.9rem;"></p>
            
            <button class="action-btn wish-btn" onclick="addToWishlist()">✨ שמור להתלבטות</button>
            <button class="action-btn done-btn" onclick="markAsDoneCurrent()">✅ עשינו את זה!</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">סגור</button>
        </div>
    </div>

    <script>
        const database = {
            home: [
                {t: "ערב שוקולד ויין", d: "טעימות עיוורות של שוקולדים שונים עם ייין טוב", e: "🍷"},
                {t: "בניית מבצר בסלון", d: "שמיכות, כריות וסרט בתוך 'מבצר' כמו פעם", e: "🏰"},
                {t: "ערב אלבומי תמונות", d: "עוברים על תמונות ישנות ומעלים זיכרונות", e: "📸"},
                {t: "פיקניק בסלון", d: "שמיכה על הרצפה, גבינות ויין", e: "🧺"},
                {t: "ערב משחקי קופסה", d: "תחרות טאקי או מונופול עד השעות הקטנות", e: "🎲"}
            ],
            out: [
                {t: "הופעת סטנד-אפ", d: "יוצאים לצחוק מכל הלב", e: "🎤"},
                {t: "פיקניק שקיעה", d: "קפה ומאפה מול הים בשעה הכי יפה", e: "🌅"},
                {t: "דייט גלידה", d: "סיבוב לילי עם גלידה מושחתת", e: "🍦"},
                {t: "ערב קריוקי", d: "חדר פרטי ושירי אהבה ששניכם אוהבים", e: "🎶"},
                {t: "הליכה לילית", d: "פשוט ללכת יחד בחוץ ולדבר על הכל", e: "🌙"}
            ]
        };

        let currentIdea = null;
        let doneCount = parseInt(localStorage.getItem('dates_done_count')) || 0;
        let wishlist = JSON.parse(localStorage.getItem('dates_wishlist')) || [];

        function pick(type) {
            const list = database[type];
            currentIdea = list[Math.floor(Math.random() * list.length)];
            document.getElementById('res-emoji').innerText = currentIdea.e;
            document.getElementById('res-title').innerText = currentIdea.t;
            document.getElementById('res-desc').innerText = currentIdea.d;
            document.getElementById('modal').style.display = 'flex';
        }

        function addToWishlist() {
            if (!wishlist.find(i => i.t === currentIdea.t)) {
                wishlist.push(currentIdea);
                save();
            }
            closeModal();
        }

        function markAsDoneCurrent() {
            doneCount++;
            save();
            closeModal();
        }

        function markAsDoneFromList(index) {
            wishlist.splice(index, 1);
            doneCount++;
            save();
        }

        function removeFromList(index) {
            if(confirm("למחוק את הרעיון מההתלבטויות?")) {
                wishlist.splice(index, 1);
                save();
            }
        }

        function fullReset() {
            if(confirm("בטוח? זה יאפס את מונה הדייטים וימחק את כל ההתלבטויות שלכם.")) {
                doneCount = 0;
                wishlist = [];
                save();
                alert("הלוח נוקה! תהנו מהתחלה חדשה ❤️");
            }
        }

        function save() {
            localStorage.setItem('dates_done_count', doneCount);
            localStorage.setItem('dates_wishlist', JSON.stringify(wishlist));
            render();
        }

        function render() {
            document.getElementById('counter-display').innerText = `דייטים שעשינו: ${doneCount}`;
            const listDiv = document.getElementById('wishlist-items');
            const container = document.getElementById('wishlist-container');
            
            listDiv.innerHTML = "";
            if (wishlist.length > 0) {
                container.style.display = 'block';
                wishlist.forEach((item, index) => {
                    listDiv.innerHTML += `
                        <div class="list-item">
                            <span>${item.e} ${item.t}</span>
                            <div class="item-actions">
                                <span class="btn-icon" title="עשינו!" onclick="markAsDoneFromList(${index})">✅</span>
                                <span class="btn-icon" title="מחק" onclick="removeFromList(${index})">🗑️</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.style.display = 'none';
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        render();
    </script>
</body>
</html>
