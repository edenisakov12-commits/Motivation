<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | The Ultimate Date Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Assistant:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-pink: #ffdce3;
            --pastel-peach: #ffeadb;
            --pastel-blue: #dcf2ff;
            --luxury-gold: #c5a059;
            --deep-text: #4a4e69;
            --white: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: #fdfaf7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--deep-text);
        }

        /* כותרת יוקרתית */
        header {
            width: 100%;
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--luxury-gold);
            margin: 0;
            letter-spacing: 2px;
            animation: gentleFloat 3s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* סידור מרכזי ומדויק */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* קטגוריות ראשיות */
        .category-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }

        .cat-card {
            background: var(--white);
            border-radius: 30px;
            padding: 30px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .cat-card:hover {
            transform: translateY(-5px);
            border-color: var(--pastel-pink);
        }

        .cat-card .emoji { font-size: 4.5rem; display: block; margin-bottom: 10px; }
        .cat-card span { font-weight: 600; font-size: 1.4rem; }

        /* אזור המשחק */
        #game-view {
            display: none;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .date-display-card {
            background: var(--white);
            border-radius: 40px;
            padding: 50px 30px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            border: 1px solid #f0f0f0;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* כפתורים מיושרים */
        .action-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn {
            border: none;
            border-radius: 20px;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .btn-want { background: linear-gradient(45deg, #ff9a9e, #fecfef); color: white; }
        .btn-maybe { background: var(--pastel-blue); color: #555; }
        .btn-nav { background: #f0f0f0; color: #444; flex: 1; }

        .nav-row { display: flex; gap: 15px; width: 100%; margin-bottom: 15px; }

        /* קונפטי */
        .confetti {
            position: fixed; width: 12px; height: 12px;
            z-index: 10000; pointer-events: none;
            animation: fall 3s ease-out forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* מודאל רשימות */
        .modal {
            display: none; position: fixed; inset: 0;
            background: #fffafb; z-index: 5000; padding: 40px 20px;
            overflow-y: auto; text-align: right;
        }
        .list-item {
            background: white; padding: 20px; border-radius: 20px;
            margin-bottom: 15px; border-right: 8px solid var(--luxury-gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>Eden & Yarden</h1>
    </header>

    <div class="main-container" id="menu-view">
        <div class="category-wrapper">
            <div class="cat-card" onclick="startApp('home')">
                <span class="emoji">🏠</span>
                <span>בבית</span>
            </div>
            <div class="cat-card" onclick="startApp('out')">
                <span class="emoji">🌳</span>
                <span>בחוץ</span>
            </div>
        </div>

        <button class="btn btn-maybe" style="background-color: var(--white); border: 2px solid var(--pastel-peach);" onclick="viewList('maybe')">📋 ההתלבטויות שלנו</button>
        <button class="btn" style="background-color: var(--deep-text); color: white;" onclick="viewList('done')">💖 היסטוריית דייטים</button>
        
        <button onclick="clearMaybe()" style="background: none; border: none; color: #ccc; cursor: pointer; margin-top: 30px;">🔄 איפוס התלבטויות בלבד</button>
    </div>

    <div class="main-container" id="game-view">
        <div class="nav-row">
            <button class="btn btn-nav" onclick="step(-1)">➡️ הקודם</button>
            <button class="btn btn-nav" onclick="step(1)">הבא ⬅️</button>
        </div>

        <div class="date-display-card" id="date-text">טוען...</div>

        <div class="action-grid">
            <button class="btn btn-want" onclick="save('done')">🌟 את זה אנחנו רוצים!</button>
            <button class="btn btn-maybe" onclick="save('maybe')">💭 תוסיף להתלבטויות</button>
        </div>

        <button onclick="exitToMenu()" style="background: none; border: none; color: #aaa; margin-top: 30px; cursor: pointer; font-weight: bold;">🔙 חזרה לתפריט</button>
    </div>

    <div id="list-modal" class="modal">
        <h2 id="modal-title" style="font-family: 'Dancing Script'; font-size: 3rem; color: var(--luxury-gold); text-align: center;"></h2>
        <div id="modal-body"></div>
        <button class="btn" style="background: #333; color: white; margin-top: 30px;" onclick="closeModal()">סגור</button>
    </div>

    <script>
        const bigDatabase = {
            home: [
                "תחרות בישול: כל אחד מכין מנה רק ממה שיש במקרר 🍳", "מרתון סרטי אימה עם פופקורן וכיסוי עיניים 🍿", "בניית פאזל 1000 חלקים עם יין מוזיקה 🍷", "סדנת ציור זוגית: מציירים אחד את השני על קנבס 🎨", "ערב קריוקי בסלון עם שירים מהילדות 🎤", "פיקניק על השטיח עם כריות ונרות 🧺", "בניית רשימת חלומות (Vision Board) משותפת 📝", "ספא ביתי: מסכות פנים ועיסוי כפות רגליים 💆‍♂️", "ערב טעימות שוקולד עיוור 🍫", "בניית 'מבצר' משמיכות וכריות וצפייה בסרט 🏰",
                "משחק קופסה תחרותי (מונופול/טאקי) עם פרס למנצח 🎲", "סדנת קוקטיילים ביתית: כל אחד ממציא משקה 🍹", "לימוד ריקוד סלסה או טנגו מיוטיוב 💃", "סידור אלבום תמונות דיגיטלי מכל השנים 📸", "ערב משחקי וידאו נוסטלגיים 🕹️", "הכנת פיצה מאפס כולל לישת הבצק 🍕", "כתיבת מכתבי אהבה אחד לשני ופתיחתם בעוד שנה ✉️", "ערב שאלות עמוקות לחיזוק הקשר 💬", "תחרות אפייה: מי מכין את הקינוח הכי יפה 🧁", "ערב טעימות יין וגבינות 🧀",
                "לשחק 'אמת או חובה' גרסה זוגית 💥", "להכין יחד רשימת השמעה (Playlist) משותפת 🎵", "ערב קריאת ספרים משותפת תחת השמיכה 📖", "תצוגת אופנה מהבגדים הכי מצחיקים בארון 👗", "לעשות יוגה זוגית בסלון 🧘‍♀️", "הכנת גלידה ביתית בטעמים מוזרים 🍦", "ללמוד קסם חדש ביוטיוב ולהראות אחד לשני ✨", "תחרות בניית לגו 🧱", "ערב פונדו שוקולד עם פירות 🍓", "לשחק 'ארץ עיר' בגרסה למבוגרים בלבד 🗺️",
                "לתכנן את הבית האידיאלי שלכם (שרטוט על דף) 🏠", "לעשות ניסויים מדעיים מצחיקים מהאינטרנט 🧪", "צילום סרטון טיקטוק או רילס משותף 📱", "ערב טעימות בירה מסוגים שונים 🍺", "לנסות להרכיב רהיט של איקאה יחד (בלי לריב!) 🛠️", "הכנת סושי ביתי 🍣", "ערב פלייסטיישן או אקסבוקס תחרותי 🎮", "משחק מחבואים בבית חשוך 🌑", "ללמוד שפה חדשה יחד (10 מילים ראשונות) 🗣️", "ערב פודקאסט: להקשיב לסיפור מעניין ולדון עליו 🎧",
                "תחרות צילום: מי מצלם את התמונה הכי יפה בבית 📷", "הכנת פסטה טרייה בעבודת יד 🍝", "לעשות 'ערב נוסטלגיה' עם סרטוני וידאו מהילדות 👶", "לשחק פוקר על מטלות בית 🃏", "ערב תה ושיחות אל תוך הלילה 🍵", "לצייר על חולצות ישנות 👕", "לפתור יחד תשבץ או סודוקו קשה 📝", "להמציא ריקוד משותף לשיר האהוב עליכם 💃", "לעשות מדיטציה זוגית מודרכת 🧘‍♂️", "לאכול ארוחת ערב בחושך מוחלט 🕯️"
            ],
            out: [
                "פיקניק בשקיעה בים עם יין ופירות 🌅", "ערב סטנד-אפ שיפיל אתכם מהכיסא 🎤", "טיול בוקר בשוק מחנה יהודה או הכרמל 🍓", "סדנת קרמיקה או נגרות זוגית 🏺", "חדר בריחה (Escape Room) מאתגר 🔓", "צפייה בכוכבים עם מפה אסטרונומית במדבר 🌌", "טיסה בכדור פורח או מסוק 🎈", "טיול אופניים בנמל או בפארק 🚲", "ביקור במוזיאון שלא הייתם בו מעולם 🏛️", "באולינג תחרותי עם הימור על ארוחת ערב 🎳",
                "החלקה על הקרח ⛸️", "נסיעה ספונטנית לצימר או מלון בוטיק 🏨", "הופעה חיה של אמן ששניכם אוהבים 🎸", "טיול רגלי בנחל או מסלול בטבע 🌿", "סדנת בישול או אפייה מקצועית 🥐", "ערב קזינו או משחקי מזל 🎰", "ביקור בגן חיות או ספארי 🦁", "טיול לילי בעיר העתיקה 🏰", "רכיבה על סוסים בשקיעה 🐎", "ספורט אתגרי (טיפוס קירות/צניחה) 🧗‍♀️",
                "שיט רומנטי בסירה באגם או בים 🛶", "סיור טעימות יין ביקב בוטיק 🍷", "בילוי בלונה פארק או סופרלנד 🎡", "צפייה בסרט בדרייב-אין 🎬", "הליכה לבית קפה אקראי בעיר זרה ☕", "חיפוש אוצרות בשוק הפשפשים 🏺", "טיול פריחה בעונה 🌸", "סדנת צילום בחוץ 📸", "ביקור במצפה תת-ימי 🐠", "ערב ג'אז במועדון קטן 🎷",
                "נסיעה לצפות בזריחה מהר גבוה ☀️", "בילוי ביום כיף בבריכה או ספא 🏊‍♂️", "התנדבות משותפת בעמותה (כמו מקלט לחיות) 🐾", "משחק 'חפש את המטמון' עירוני 🚩", "סיור לילי בעקבות רוחות רפאים או היסטוריה 👻", "ללכת למשחק כדורגל או כדורסל יחד 🏀", "טיול טרקטורונים או רייזרים 🏎️", "ללכת לקטיף עצמי של פירות (תותים/דובדבנים) 🍒", "סדנת גלישה בים 🏄‍♂️", "ביקור בפלנטריום 🪐",
                "לשבת בבר קריוקי ולהעז לשיר 🎙️", "טיול בנהר עם קיאקים 🚣‍♂️", "פיקניק לילי בפארק עם פנסים 🔦", "ללכת לשיעור ניסיון ביוגה באוויר 🧘‍♀️", "ביקור בתערוכת אמנות אינטראקטיבית 🎆", "טיול בשמורה טבעית עם מעיינות 💦", "ללכת למסעדה עם מטבח שעוד לא ניסיתם 🍜", "משחק מיני גולף ⛳", "סיור גרפיטי בשכונה מגניבה 🎨", "נסיעה בלילה למקום גבוה לצפות באורות העיר 🏙️"
            ]
        };

        let currentCategory = '';
        let currentIndex = 0;
        let storage = JSON.parse(localStorage.getItem('EY_App_V5')) || { maybe: [], done: [] };

        function startApp(cat) {
            currentCategory = cat;
            currentIndex = 0;
            document.getElementById('menu-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            updateCard();
            triggerConfetti();
        }

        function updateCard() {
            document.getElementById('date-text').innerText = bigDatabase[currentCategory][currentIndex];
        }

        function step(n) {
            currentIndex = (currentIndex + n + bigDatabase[currentCategory].length) % bigDatabase[currentCategory].length;
            updateCard();
        }

        function save(type) {
            const item = bigDatabase[currentCategory][currentIndex];
            if (!storage[type].includes(item)) {
                storage[type].push(item);
                localStorage.setItem('EY_App_V5', JSON.stringify(storage));
                triggerConfetti();
                alert(type === 'done' ? "נוסף להיסטוריה המדהימה שלכם! ✨" : "נשמר בהתלבטויות! 🤔");
            } else {
                alert("זה כבר רשום לכם!");
            }
        }

        function viewList(type) {
            const modal = document.getElementById('list-modal');
            const body = document.getElementById('modal-body');
            const title = document.getElementById('modal-title');
            
            title.innerText = type === 'done' ? "Our Memories" : "Thinking About It";
            body.innerHTML = storage[type].length ? storage[type].map(i => `<div class="list-item">${i}</div>`).join('') : "<p style='text-align:center'>עדיין ריק כאן...</p>";
            modal.style.display = 'block';
        }

        function closeModal() { document.getElementById('list-modal').style.display = 'none'; }
        function exitToMenu() {
            document.getElementById('menu-view').style.display = 'flex';
            document.getElementById('game-view').style.display = 'none';
        }

        function clearMaybe() {
            if(confirm("למחוק את רשימת ההתלבטויות? ההיסטוריה תישמר.")) {
                storage.maybe = [];
                localStorage.setItem('EY_App_V5', JSON.stringify(storage));
                location.reload();
            }
        }

        function triggerConfetti() {
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 70%)`;
                conf.style.top = '-20px';
                conf.style.width = Math.random() * 10 + 5 + 'px';
                conf.style.height = conf.style.width;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 3000);
            }
        }
    </script>
</body>
</html>
