<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | Forever & Always</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Assistant:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-rose: #f4d3d3;
            --dusty-gold: #d4af37;
            --warm-beige: #faf3ef;
            --deep-mauve: #6d597a;
            --white: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--warm-beige);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; color: var(--deep-mauve);
        }

        header { padding: 40px 0; text-align: center; }
        header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem; color: var(--dusty-gold);
            margin: 0; animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px rgba(212,175,55,0.2); }
            50% { text-shadow: 0 0 20px rgba(212,175,55,0.5); }
        }

        .main-wrapper {
            width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 20px;
        }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-cat {
            background: var(--white); border-radius: 30px; padding: 35px 15px;
            text-align: center; cursor: pointer; border: 1px solid rgba(109,89,122,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); transition: 0.3s;
        }
        .btn-cat:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .btn-cat .emoji { font-size: 4rem; display: block; margin-bottom: 10px; }
        .btn-cat span { font-weight: 600; font-size: 1.3rem; }

        #display-area { display: none; text-align: center; animation: fadeIn 0.5s; }
        .date-card {
            background: var(--white); border-radius: 40px; padding: 50px 25px;
            min-height: 160px; display: flex; align-items: center; justify-content: center;
            font-size: 1.7rem; font-weight: bold; line-height: 1.4;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); margin-bottom: 30px;
        }

        .btn-full {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-heart { background: linear-gradient(45deg, #ff9a9e, #fecfef); color: white; }
        .btn-think { background: #f0f0f0; color: var(--deep-mauve); }

        /* כפתור ירדן בלבד */
        .yarden-only {
            background: var(--dusty-gold); color: white; border: none;
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-size: 0.9rem; font-weight: bold; margin-top: 40px;
            box-shadow: 0 5px 15px rgba(212,175,55,0.3); align-self: center;
        }

        .modal {
            display: none; position: fixed; inset: 0; background: var(--warm-beige);
            z-index: 1000; padding: 40px 20px; overflow-y: auto; text-align: right;
        }
        .list-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid var(--dusty-gold); }

        .confetti {
            position: fixed; z-index: 2000; pointer-events: none;
            animation: fall 2.5s linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <header><h1>Eden & Yarden</h1></header>

    <div class="main-wrapper" id="menu-screen">
        <div class="cat-grid">
            <div class="btn-cat" onclick="start('home')">
                <span class="emoji">🏠</span><span>בבית</span>
            </div>
            <div class="btn-cat" onclick="start('out')">
                <span class="emoji">🌳</span><span>בחוץ</span>
            </div>
        </div>

        <button class="btn-full btn-think" onclick="showList('maybe')">📋 ההתלבטויות שלנו</button>
        <button class="btn-full" style="background: var(--deep-mauve); color: white;" onclick="showList('done')">💖 היסטוריית הדייטים</button>
        
        <button class="yarden-only" onclick="yardenMessage()">🗝️ לירדן בלבד</button>
        <button onclick="resetMaybe()" style="background:none; border:none; color:#ccc; cursor:pointer; margin-top:20px;">איפוס התלבטויות</button>
    </div>

    <div class="main-wrapper" id="display-area">
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <button class="btn-full btn-think" style="flex:1" onclick="nav(-1)">➡️ הקודם</button>
            <button class="btn-full btn-think" style="flex:1" onclick="nav(1)">הבא ⬅️</button>
        </div>
        <div class="date-card" id="date-text"></div>
        <button class="btn-full btn-heart" onclick="save('done')">🌟 את זה אנחנו רוצים!</button>
        <button class="btn-full btn-think" onclick="save('maybe')">💭 אולי פעם אחרת?</button>
        <button onclick="back()" style="background:none; border:none; color:#aaa; margin-top:20px; cursor:pointer;">חזרה לתפריט</button>
    </div>

    <div id="modal" class="modal">
        <h2 id="modal-title" style="text-align:center; font-family:'Dancing Script'; font-size:3rem; color:var(--dusty-gold);"></h2>
        <div id="modal-body"></div>
        <button class="btn-full" style="background:#333; color:white; margin-top:20px;" onclick="closeM()">סגור</button>
    </div>

    <script>
        const db = {
            home: [
                "ערב טעימות עיוורות של פירות וגבינות במיטה 🍇", "מרתון סרטים רומנטיים עם יין בלבד 🍷", "סדנת עיסוי הדדית עם שמנים ריחניים 💆‍♀️", "ערב 'משחקי תפקידים' קליל ומהנה 🎭", "בישול ארוחת שף יחד בבגדי ערב יוקרתיים 👗", "ערב שאלות 'כרטיסי אינטימיות' לשיחות עמוקות ✨", "בניית רשימת משאלות זוגית לשנה הקרובה 📝", "ערב קוקטיילים נועזים שמעולם לא ניסיתם 🍹", "ספא ביתי עם נרות ומוזיקה מרגיעה באמבטיה 🛀", "תחרות ציור על הגוף עם צבעים מתנקים 🎨",
                "ריקוד סלואו בסלון לצלילי השיר שלכם 🎶", "להכין יחד פונדו שוקולד עם תותים ומרשמלו 🍓", "ערב 'קזינו' ביתי עם הימורים על מטלות בית 🃏", "צפייה בתמונות החתונה והילדות עם יין 📸", "להזמין אוכל ממסעדה יוקרתית ולאכול על השטיח 🧺", "ערב פנטזיות - לדבר על כל מה שחולמים לעשות 💭", "הכנת סושי ביתי בשיטת 'עשה זאת בעצמך' 🍣", "משחק מחבואים בבית חשוך לגמרי 🌑", "לקרוא אחד לשני שירים או סיפורים במיטה 📖", "ערב משחקי וידאו תחרותיים (מריו קארט!) 🎮"
                // ... ניתן להוסיף כאן עוד עשרות רעיונות באותו סגנון
            ],
            out: [
                "פיקניק לילי מול הים עם מוזיקה שקטה 🌅", "לילה בבית מלון בוטיק באותה עיר 🏨", "צפייה בזריחה מהר גבוה עם תרמוס קפה ☀️", "הופעת ג'אז או בלוז במועדון קטן ואינטימי 🎷", "סדנת קרמיקה זוגית (הכי 'רוח רפאים' שיש) 🏺", "טיסה פרטית בשמי הארץ בשקיעה 🎈", "ערב טעימות יין ביקב מרוחק 🍷", "שיט בסירה קטנה באגם או בים 🛶", "טיול לילה בירושלים או ביפו העתיקה 🏰", "סדנת ריקוד לטיני פרטית רק לשניכם 💃",
                "צפייה בכוכבים במדבר עם שמיכה זוגית 🌌", "ארוחת ערב במסעדת שף עם מטבח פתוח 👨‍🍳", "טיול סוסים בשקיעה על קו החוף 🐎", "בילוי בספא זוגי עם טיפול מפנק 🧖‍♂️", "נסיעה ספונטנית לשדה התעופה וטיסה ליעד קרוב ✈️", "חדר בריחה (Escape Room) בדרגת קושי גבוהה 🔓", "החלקה על הקרח בשעת לילה מאוחרת ⛸️", "ביקור בתערוכת אמנות נועזת 🖼️", "סקי מים או פעילות אתגרית בים 🌊", "לצאת לבר קריוקי ולשיר דואט רומנטי 🎤"
            ]
        };

        const yardenLines = [
            "אמרת לעדן כמה היא יפה היום? 😍",
            "תזכיר לעדן שהיא הדבר הכי טוב שקרה לך בחיים. ✨",
            "חיבוק של 20 שניות לעדן - עכשיו! 🤗",
            "תגיד לעדן שהיא האור של הבית. 💡",
            "שלח לעדן הודעה 'אני אוהב אותך' גם אם היא לידך. 📱",
            "ירדן, אשתך היא מלכה, תתנהג אליה ככה! 👑",
            "תחמיא לעדן על משהו שהיא עשתה היום. 🌸"
        ];

        let curCat = ''; let curIdx = 0;
        let store = JSON.parse(localStorage.getItem('EY_V6')) || { maybe: [], done: [] };

        function start(c) {
            curCat = c; curIdx = 0;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('display-area').style.display = 'block';
            update(); confetti();
        }

        function update() { document.getElementById('date-text').innerText = db[curCat][curIdx]; }
        function nav(s) { curIdx = (curIdx + s + db[curCat].length) % db[curCat].length; update(); }

        function save(t) {
            const item = db[curCat][curIdx];
            if (!store[t].includes(item)) {
                store[t].push(item);
                localStorage.setItem('EY_V6', JSON.stringify(store));
                confetti(); alert("נשמר בהצלחה! ❤️");
            } else { alert("כבר ברשימה שלכם."); }
        }

        function yardenMessage() {
            const msg = yardenLines[Math.floor(Math.random() * yardenLines.length)];
            alert("הודעה לירדן: \n" + msg);
        }

        function showList(t) {
            const m = document.getElementById('modal');
            document.getElementById('modal-title').innerText = t === 'done' ? "Our Love Story" : "Thinking...";
            document.getElementById('modal-body').innerHTML = store[t].length ? store[t].map(i => `<div class="list-item">${i}</div>`).join('') : "עוד אין כלום...";
            m.style.display = 'block';
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }
        function back() { document.getElementById('menu-screen').style.display = 'flex'; document.getElementById('display-area').style.display = 'none'; }

        function confetti() {
            for(let i=0; i<30; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random()*100+'vw';
                c.style.top = '-10px';
                c.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 70%)`;
                c.style.width = '10px'; c.style.height = '10px';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 2500);
            }
        }

        function resetMaybe() { if(confirm("לאפס התלבטויות?")) { store.maybe = []; localStorage.setItem('EY_V6', JSON.stringify(store)); location.reload(); } }
    </script>
</body>
</html>
