<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden & Yarden | Love & Dates</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Assistant:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-pink: #fbc2eb;
            --soft-orange: #f6d365;
            --cream: #fff9f0;
            --rose-gold: #e5989b;
            --text-dark: #6d597a;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            background-color: var(--cream);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.8rem;
            color: var(--rose-gold);
            margin: 30px 0;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        /* תפריט ראשי */
        .categories {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-select {
            width: 140px;
            height: 190px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.4s;
            background: white;
            box-shadow: 0 10px 20px rgba(109, 89, 122, 0.1);
            border: 2px solid rgba(229, 152, 155, 0.2);
        }

        .card-select:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 30px rgba(229, 152, 155, 0.3);
        }

        .emoji-large { font-size: 4.5rem; margin-bottom: 10px; }
        .card-label { font-weight: 600; font-size: 1.3rem; color: var(--text-dark); }

        /* אזור המשחק */
        #game-area {
            display: none;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .date-card {
            background: white;
            border-radius: 40px;
            padding: 40px 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            font-size: 1.7rem;
            font-weight: bold;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border: 1px solid #eee;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* כפתורים */
        .btn-main {
            width: 90%;
            padding: 18px;
            border-radius: 25px;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-want { background: linear-gradient(to right, #ff9a9e 0%, #fecfef 100%); color: white; }
        .btn-maybe { background: #fdfcfb; color: var(--text-dark); border: 2px solid #eee; }
        .btn-history { background: #6d597a; color: white; width: 260px; }

        /* מודאל רשימות */
        .modal {
            display: none; position: fixed; inset: 0; background: var(--cream);
            z-index: 2000; padding: 40px 20px; overflow-y: auto;
        }
        .list-item {
            background: white; padding: 20px; border-radius: 20px;
            margin-bottom: 15px; border-right: 6px solid var(--rose-gold);
            text-align: right; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* אנימציה של לבבות */
        .heart {
            position: fixed; font-size: 2rem; z-index: 3000;
            pointer-events: none; animation: flyUp 2s ease-out forwards;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Eden & Yarden</h1>
    </header>

    <div id="main-menu" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="categories">
            <div class="card-select" onclick="openDates('home')">
                <div class="emoji-large">🏠</div>
                <div class="card-label">בבית</div>
            </div>
            <div class="card-select" onclick="openDates('out')">
                <div class="emoji-large">🌳</div>
                <div class="card-label">בחוץ</div>
            </div>
        </div>

        <button class="btn-main btn-maybe" style="width: 260px;" onclick="showList('maybe')">📋 ההתלבטויות שלנו</button>
        <button class="btn-main btn-history" onclick="showList('done')">💖 היסטוריית הדייטים</button>
        
        <button onclick="softReset()" style="margin-top: 40px; background: none; border: none; color: #bbb; cursor: pointer; text-decoration: underline;">🔄 איפוס בחירות (ההיסטוריה תישמר)</button>
    </div>

    <div id="game-area">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <button class="btn-main" style="width: 60px; height: 60px; border-radius: 50%;" onclick="navigate(-1)">➡️</button>
            <button class="btn-main" style="width: 60px; height: 60px; border-radius: 50%;" onclick="navigate(1)">⬅️</button>
        </div>

        <div class="date-card" id="card-text">טוען רעיון...</div>

        <button class="btn-main btn-want" onclick="saveDate('done')">🌟 את זה אנחנו רוצים!</button>
        <button class="btn-main btn-maybe" onclick="saveDate('maybe')">🤔 תוסיף להתלבטויות</button>
        
        <button onclick="goHome()" style="margin-top: 30px; background: none; border: none; color: #aaa; cursor: pointer;">🔙 חזרה לתפריט</button>
    </div>

    <div id="modal" class="modal">
        <h2 id="modal-title" style="font-family: 'Dancing Script'; font-size: 3rem; color: var(--rose-gold); text-align: center;"></h2>
        <div id="modal-content"></div>
        <button class="btn-main" onclick="closeModal()" style="background: #444; color: white; margin-top: 20px;">סגור</button>
    </div>

    <script>
        const datePool = {
            home: ["ערב סושי ביתי 🍣", "מרתון סרטים מצוירים 🎥", "תחרות בישול זוגית 🥘", "ערב משחקי קופסה ויין 🍷", "ספא ביתי מפנק 🕯️", "פיקניק על השטיח 🧺", "סידור אלבומי תמונות 📸", "ערב קריוקי בסלון 🎤", "בניית רשימת חלומות 📝", "סדנת קוקטיילים 🍸"],
            out: ["טיול שקיעה בים 🌅", "הופעת סטנד-אפ 🎤", "חדר בריחה 🔓", "טיול בשוק אוכל 🍓", "צפייה בכוכבים 🌌", "סדנת קרמיקה 🏺", "החלקה על הקרח ⛸️", "באולינג תחרותי 🎳", "פיקניק ביער 🌳", "נסיעה ספונטנית 🚗"]
        };

        // טעינת נתונים - שימי לב: היסטוריית ה-Done נשמרת בנפרד
        let gameData = JSON.parse(localStorage.getItem('edenYarden_Data')) || { maybe: [] };
        let historyData = JSON.parse(localStorage.getItem('edenYarden_History')) || [];

        let currentType = '';
        let currentIndex = 0;

        function openDates(type) {
            currentType = type;
            currentIndex = 0;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateUI();
            celebrate('✨');
        }

        function updateUI() {
            document.getElementById('card-text').innerText = datePool[currentType][currentIndex];
        }

        function navigate(step) {
            currentIndex = (currentIndex + step + datePool[currentType].length) % datePool[currentType].length;
            updateUI();
        }

        function saveDate(listType) {
            const currentItem = datePool[currentType][currentIndex];
            
            if (listType === 'done') {
                if (!historyData.includes(currentItem)) {
                    historyData.push(currentItem);
                    localStorage.setItem('edenYarden_History', JSON.stringify(historyData));
                    celebrate('💖');
                    alert("נוספו להיסטוריה שלכם! 🥂");
                } else { alert("כבר עשיתם את זה! 😉"); }
            } else {
                if (!gameData.maybe.includes(currentItem)) {
                    gameData.maybe.push(currentItem);
                    localStorage.setItem('edenYarden_Data', JSON.stringify(gameData));
                    celebrate('💭');
                    alert("נשמר בהתלבטויות.");
                } else { alert("כבר נמצא בהתלבטויות שלכם."); }
            }
        }

        function showList(type) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            const title = document.getElementById('modal-title');
            
            title.innerText = type === 'done' ? "Our Love History" : "Thinking About...";
            const listToDisplay = type === 'done' ? historyData : gameData.maybe;
            
            content.innerHTML = listToDisplay.length ? listToDisplay.map(i => `<div class="list-item">${i}</div>`).join('') : "<p style='text-align:center'>עוד אין כאן כלום...</p>";
            modal.style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function goHome() { 
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-area').style.display = 'none';
        }

        // פונקציית האיפוס שביקשת - מאפסת רק את ה"אולי" ולא את ההיסטוריה
        function softReset() {
            if (confirm("לאפס את רשימת ההתלבטויות? (היסטוריית הדייטים שעשיתם תישמר!)")) {
                gameData.maybe = [];
                localStorage.setItem('edenYarden_Data', JSON.stringify(gameData));
                celebrate('🔄');
                location.reload();
            }
        }

        function celebrate(emoji) {
            for (let i = 0; i < 15; i++) {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerText = emoji;
                h.style.left = Math.random() * 100 + 'vw';
                h.style.bottom = '-50px';
                h.style.transition = `all ${Math.random() * 2 + 1}s ease-in`;
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 2000);
            }
        }
    </script>
</body>
</html>
