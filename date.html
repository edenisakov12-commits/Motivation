<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדייטים של עדן וירדן</title>
    <style>
        :root {
            --bg-color: #fff5f5;
            --home-color: #ff9a9e;
            --out-color: #a1c4fd;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            margin-top: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            margin-top: 30px;
        }

        /* כרטיסי בחירה ראשיים */
        .main-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .category-card {
            width: 140px;
            height: 180px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .category-card:hover { transform: scale(1.05); }
        .home { background-color: var(--home-color); color: white; }
        .out { background-color: var(--out-color); color: white; }

        /* אזור הדייטים */
        #date-display {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .date-content { font-size: 1.5rem; margin-bottom: 20px; min-height: 80px; }

        .nav-buttons { display: flex; justify-content: space-between; margin-bottom: 20px; }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .action-buttons { display: flex; gap: 10px; justify-content: center; }
        .done-btn { background-color: #81c784; color: white; }
        .maybe-btn { background-color: #ffd54f; color: white; }
        .reset-btn { margin-top: 50px; background-color: #e0e0e0; font-size: 0.8rem; }

        .status-badge { font-size: 0.9rem; color: #ff6b6b; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <header>
        <h1>💕 עדן & ירדן 💕</h1>
        <p>מה עושים היום?</p>
    </header>

    <div class="container">
        <div class="main-cards" id="main-menu">
            <div class="category-card home" onclick="startDates('home')">🏠<br>דייט בבית</div>
            <div class="category-card out" onclick="startDates('out')">🌳<br>דייט בחוץ</div>
        </div>

        <div id="date-display">
            <div class="nav-buttons">
                <button onclick="prevDate()">➡️ הקודם</button>
                <button onclick="nextDate()">הבא ⬅️</button>
            </div>
            
            <div class="date-content" id="date-text"></div>
            <span id="status" class="status-badge"></span>

            <div class="action-buttons">
                <button class="done-btn" onclick="markDone()">✅ עשינו את זה!</button>
                <button class="maybe-btn" onclick="markMaybe()">🤔 מתלבטים...</button>
            </div>
            
            <button onclick="goBack()" style="margin-top: 20px; background: none; color: #aaa;">חזרה לתפריט</button>
        </div>

        <button class="reset-btn" onclick="resetAll()">🔄 איפוס הכל מחדש</button>
    </div>

    <script>
        // מאגר דייטים - כאן אפשר להוסיף עוד המון רעיונות!
        const database = {
            home: [
                { id: 1, text: "תחרות בישול של מנה מ-3 מרכיבים בלבד 🍳", done: false, maybe: false },
                { id: 2, text: "ערב סרטים נוסטלגיים מהילדות עם פופקורן 🍿", done: false, maybe: false },
                { id: 3, text: "בניית 'מבצר' משמיכות וכריות בסלון 🏰", done: false, maybe: false },
                { id: 4, text: "משחק קופסה תחרותי עם פרס למנצח 🎲", done: false, maybe: false }
            ],
            out: [
                { id: 101, text: "פיקניק לילי בפארק עם יין וגבינות 🍷", done: false, maybe: false },
                { id: 102, text: "טיול בנמל בשקיעה עם גלידה 🍦", done: false, maybe: false },
                { id: 103, text: "סדנת קרמיקה או ציור זוגית 🎨", done: false, maybe: false },
                { id: 104, text: "ביקור במקום שמעולם לא הייתם בו בעיר 📍", done: false, maybe: false }
            ]
        };

        let currentCategory = '';
        let currentIndex = 0;

        function startDates(category) {
            currentCategory = category;
            currentIndex = 0;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('date-display').style.display = 'block';
            updateDisplay();
            showEmojiAnimation('✨');
        }

        function updateDisplay() {
            const date = database[currentCategory][currentIndex];
            document.getElementById('date-text').innerText = date.text;
            
            let statusText = '';
            if (date.done) statusText = '✅ כבר עשינו את זה!';
            else if (date.maybe) statusText = '🤔 סימנו כהתלבטות';
            document.getElementById('status').innerText = statusText;
        }

        function nextDate() {
            if (currentIndex < database[currentCategory].length - 1) {
                currentIndex++;
                updateDisplay();
            }
        }

        function prevDate() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        function markDone() {
            database[currentCategory][currentIndex].done = true;
            showEmojiAnimation('🎉');
            updateDisplay();
        }

        function markMaybe() {
            database[currentCategory][currentIndex].maybe = true;
            showEmojiAnimation('💭');
            updateDisplay();
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('date-display').style.display = 'none';
        }

        function resetAll() {
            if(confirm("בטוחה שאת רוצה לאפס את כל ההתקדמות?")) {
                location.reload();
            }
        }

        function showEmojiAnimation(emoji) {
            const div = document.createElement('div');
            div.innerText = emoji;
            div.style.position = 'fixed';
            div.style.left = Math.random() * 80 + 10 + '%';
            div.style.top = '100%';
            div.style.fontSize = '3rem';
            div.style.transition = 'all 2s';
            div.style.zIndex = '1000';
            document.body.appendChild(div);
            
            setTimeout(() => {
                div.style.top = '-10%';
                div.style.opacity = '0';
            }, 100);
            
            setTimeout(() => div.remove(), 2000);
        }
    </script>
</body>
</html>
