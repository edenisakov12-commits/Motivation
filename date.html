<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדייטים של עדן וירדן ✨</title>
    <style>
        :root {
            --bg: #fff0f6;
            --primary: #ff85a1;
            --secondary: #74c0fc;
            --success: #63e6be;
            --accent: #ffd43b;
            --text: #495057;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { font-size: 2.8rem; color: var(--primary); text-shadow: 3px 3px white; margin-bottom: 10px; animation: heartBeat 2s infinite; }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* תפריט ראשי */
        .menu { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        .categories { display: flex; gap: 20px; }

        .card-select {
            width: 140px; height: 180px; border-radius: 30px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); font-size: 1.3rem; font-weight: bold;
            border: 5px solid white;
        }
        .card-select:hover { transform: scale(1.1) rotate(5deg); }
        .home-bg { background: linear-gradient(45deg, #ff9a9e, #fad0c4); color: white; }
        .out-bg { background: linear-gradient(45deg, #a1c4fd, #c2e9fb); color: white; }

        /* אזור המשחק */
        #game-area { display: none; width: 100%; max-width: 400px; text-align: center; animation: slideUp 0.5s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .date-card {
            background: white; border-radius: 40px; padding: 40px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 3px solid var(--primary);
            min-height: 120px; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: bold; margin-bottom: 25px;
            animation: bounceIn 0.8s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* כפתורים */
        .btn {
            border: none; border-radius: 20px; padding: 15px 25px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-want { background-color: var(--success); color: white; font-size: 1.1rem; }
        .btn-maybe { background-color: var(--accent); color: #5d4037; }
        .btn-nav { background-color: white; color: var(--text); border: 2px solid #eee; }
        .btn-view-list { background-color: #e599f7; color: white; width: 220px; margin-top: 10px; }

        /* רשימות */
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,240,246,0.98); z-index: 1000; padding: 40px 20px;
            overflow-y: auto; text-align: right;
        }
        .list-item {
            background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-right: 5px solid var(--primary);
        }

        /* קונפטי */
        .confetti {
            position: fixed; width: 10px; height: 10px; z-index: 999;
            animation: fall 3s linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>✨ עדן & ירדן ✨</h1>

    <div class="menu" id="main-menu">
        <div class="categories">
            <div class="card-select home-bg" onclick="initGame('home')">🏠<br>דייט בבית</div>
            <div class="card-select out-bg" onclick="initGame('out')">🌳<br>דייט בחוץ</div>
        </div>
        
        <button class="btn btn-view-list" onclick="showList('maybe')">🤔 רשימת התלבטויות</button>
        <button class="btn btn-view-list" style="background-color: #ff8ea1;" onclick="showList('done')">💖 דייטים שעשינו</button>
        
        <button onclick="fullReset()" style="margin-top: 50px; background: none; border: none; color: #ccc; cursor: pointer;">🔄 איפוס הכל מחדש</button>
    </div>

    <div id="game-area">
        <div class="date-card" id="card-text">טוען דייט...</div>
        
        <div style="margin-bottom: 20px;">
            <button class="btn btn-nav" onclick="changeDate(-1)">➡️ הקודם</button>
            <button class="btn btn-nav" onclick="changeDate(1)">הבא ⬅️</button>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn btn-want" onclick="saveAction('done')">🌟 את זה אנחנו רוצים!</button>
            <button class="btn btn-maybe" onclick="saveAction('maybe')">🤔 תוסיף להתלבטויות</button>
        </div>

        <button onclick="goHome()" style="margin-top: 30px; background: none; border: none; color: #aaa; cursor: pointer;">🔙 חזרה לתפריט</button>
    </div>

    <div id="list-modal" class="modal">
        <h2 id="modal-title" style="color: var(--primary);"></h2>
        <div id="modal-content"></div>
        <button class="btn" onclick="closeModal()" style="background: #444; color: white; width: 100%; margin-top: 20px;">סגור</button>
    </div>

    <script>
        const database = {
            home: ["ערב סושי ביתי 🍣", "מרתון סרטים מצוירים 🎥", "ערב טריוויה זוגי על ההיסטוריה שלנו 📚", "תחרות ציור אחד של השני 🎨", "פיקניק על השטיח בסלון 🧺", "ערב משחקי וידאו של פעם 🕹️", "סדנת קוקטיילים ביתית 🍸", "סידור אלבום תמונות משותף 📸", "בניית רשימת חלומות לעשור הקרוב 📝", "ערב שוקו חם וסיפורים מתחת לשמיכה ☕"],
            out: ["הופעת סטנד-אפ קורעת 🎤", "טיול שקיעה בים 🌅", "סדנת בישול או אפייה 🥐", "חדר בריחה מאתגר 🔓", "החלקה על הקרח ⛸️", "טיסה בכדור פורח (או סתם תצפית גבוהה) 🎈", "ערב טעימות יין ביקב 🍷", "טיול לילי בעיר העתיקה 🏰", "פיקניק בפארק עם ספרים 📖", "רכיבה על אופניים בטיילת 🚲"]
        };

        let currentType = '';
        let currentIndex = 0;

        // טעינת נתונים שמורים
        let savedData = JSON.parse(localStorage.getItem('edenYardenGame')) || { done: [], maybe: [] };

        function initGame(type) {
            currentType = type;
            currentIndex = 0;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateCard();
            createConfetti();
        }

        function updateCard() {
            const card = document.getElementById('card-text');
            card.style.animation = 'none';
            card.offsetHeight; /* trigger reflow */
            card.style.animation = 'bounceIn 0.6s';
            card.innerText = database[currentType][currentIndex];
        }

        function changeDate(step) {
            currentIndex = (currentIndex + step + database[currentType].length) % database[currentType].length;
            updateCard();
        }

        function saveAction(listType) {
            const text = database[currentType][currentIndex];
            if (!savedData[listType].includes(text)) {
                savedData[listType].push(text);
                localStorage.setItem('edenYardenGame', JSON.stringify(savedData));
                createConfetti();
                alert(listType === 'done' ? "נוסף לרשימת הדייטים שעשינו! ❤️" : "נוסף להתלבטויות! 🤔");
            } else {
                alert("זה כבר נמצא ברשימה שלכם!");
            }
        }

        function showList(type) {
            const modal = document.getElementById('list-modal');
            const content = document.getElementById('modal-content');
            const title = document.getElementById('modal-title');
            
            title.innerText = type === 'done' ? "דייטים שעשינו ❤️" : "התלבטויות שלנו 🤔";
            
            if (savedData[type].length === 0) {
                content.innerHTML = "<p>הרשימה עדיין ריקה... לכו לבחור דייטים!</p>";
            } else {
                content.innerHTML = savedData[type].map(item => `<div class="list-item">${item}</div>`).join('');
            }
            
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('list-modal').style.display = 'none';
        }

        function goHome() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('game-area').style.display = 'none';
        }

        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 70%)`;
                c.style.top = '-10px';
                c.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        function fullReset() {
            if (confirm("בטוחה? זה ימחק את כל הרשימות שלכם לנצח!")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
