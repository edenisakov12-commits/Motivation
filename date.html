<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דייט-לנד אשקלון ❤️</title>
    <style>
        :root {
            --home-bg: #fff0f6; --out-bg: #e6f7ff; --accent: #ff2d55;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background: #fdfdfd; 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card {
            width: 150px; height: 150px; border-radius: 30px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); border: 3px solid white;
        }
        .card:hover { transform: translateY(-10px); }
        .home { background-color: var(--home-bg); }
        .out { background-color: var(--out-bg); }
        
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); z-index: 100; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        .result-box {
            background: white; padding: 35px; border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); max-width: 450px; border: 1px solid #eee;
        }
        .btn {
            border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 10px;
        }
        .close-btn { background: var(--accent); color: white; }
        .search-btn { background: #4caf50; color: white; text-decoration: none; display: inline-block; font-size: 0.9rem; }
        .counter { margin-top: 20px; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

    <h1 style="color: var(--accent);">דייט באשקלון והסביבה ❤️</h1>
    <div id="stats" class="counter"></div>

    <div class="container">
        <div class="card home" onclick="draw('home')">
            <span style="font-size: 3.5rem;">🏠</span>
            <strong>בבית</strong>
        </div>
        <div class="card out" onclick="draw('out')">
            <span style="font-size: 3.5rem;">🌊</span>
            <strong>יוצאים</strong>
        </div>
    </div>

    <div id="overlay">
        <div class="result-box">
            <div id="res-emoji" style="font-size: 5rem;"></div>
            <div id="res-text" style="font-size: 1.6rem; margin: 20px 0; font-weight: bold;"></div>
            <div id="extra-info"></div>
            <button class="btn close-btn" onclick="document.getElementById('overlay').style.display='none'">אחלה רעיון!</button>
        </div>
    </div>

    <script>
        const database = {
            home: [
                {t: "ערב טעימות יין וגבינות מ'מחלבות דרומיות' בסלון", e: "🍷"},
                {t: "סדנת שוקולד ביתית - ממיסים ומכינים פרלינים", e: "🍫"},
                {t: "מרתון סרטים בכיכוב השחקן ששניכם הכי אוהבים", e: "🎬"},
                {t: "ערב 'משחקי ילדות' - טאקי, שחמט או מונופול", e: "🎲"},
                {t: "בישול משותף של ארוחת 3 מנות (מנה ראשונה, עיקרית וקינוח)", e: "👨‍🍳"},
                {t: "פיקניק לילי על המרפסת עם מוזיקה שקטה", e: "🌙"}
            ],
            out: [
                {t: "ערב סטנד-אפ קורע מצחוק! בדקו הופעות קרובות", e: "🎤", search: "הופעות סטנד אפ באשקלון והסביבה"},
                {t: "הופעה חיה או הצגת תיאטרון בהיכל התרבות אשקלון", e: "🎭", search: "היכל התרבות אשקלון לוח הופעות"},
                {t: "הליכה רומנטית במרינה אשקלון וקינוח מול המים", e: "⛵"},
                {t: "דייט גלידה לילי בטיילת בר כוכבא", e: "🍦"},
                {t: "ערב סרט ב-Hot Cinema באשקלון עם פופקורן ענק", e: "🍿", search: "הוט סינמה אשקלון סרטים"},
                {t: "ביקור בבר יין או פאב מקומי במרינה", e: "🍻"},
                {t: "טיול שקיעה בגן הלאומי אשקלון (לפני שנסגר)", e: "🏛️"},
                {t: "נסיעה קצרה למתחם 'מבנה' או 'גלובוס סנטר' לארוחה מפנקת", e: "🍔"}
            ]
        };

        let counts = JSON.parse(localStorage.getItem('date_counts')) || { home: 0, out: 0 };

        function draw(type) {
            const list = database[type];
            const idea = list[Math.floor(Math.random() * list.length)];
            
            document.getElementById('res-emoji').innerText = idea.e;
            document.getElementById('res-text').innerText = idea.t;
            
            const extra = document.getElementById('extra-info');
            extra.innerHTML = "";
            if(idea.search) {
                extra.innerHTML = `<a href="https://www.google.com/search?q=${encodeURIComponent(idea.search)}" target="_blank" class="btn search-btn">🔎 בדוק כרטיסים ומועדים</a>`;
            }

            counts[type]++;
            localStorage.setItem('date_counts', JSON.stringify(counts));
            updateStats();
            document.getElementById('overlay').style.display = 'flex';
        }

        function updateStats() {
            document.getElementById('stats').innerText = `עשינו עד היום: ${counts.home} דייטים בבית ו-${counts.out} בחוץ!`;
        }
        updateStats();
    </script>
</body>
</html>
